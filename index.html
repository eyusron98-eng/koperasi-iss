const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDvERzufLQJNeYreqZMZfEdGjBUxDw3avmYKvLOG8NJTJ5yF3Z67LVriqfyZUl4gOJ6w/exec';

const DAPUR = [
  {id:'mekarsari',  nama:'Mekarsari',   pic:'Bu Sari',       hp:'08111111111',   alamat:'SPPG Mekarsari, Bandung'},
  {id:'cipeujeuh2', nama:'Cipeujeuh 2', pic:'Pak Hendra',    hp:'08222222222',   alamat:'SPPG Cipeujeuh 2, Bandung'},
  {id:'sukamukti',  nama:'Sukamukti',   pic:'Della Maldini', hp:'0882000476152', alamat:'SPPG Sukamukti, Majalaya'},
  {id:'cipaku2',    nama:'Cipaku 2',    pic:'Bu Wati',       hp:'08444444444',   alamat:'SPPG Cipaku 2, Bandung'},
];

// =============================================
// HELPERS
// =============================================
function normDate(d) {
  if (!d) return '';
  const s = String(d).trim();
  // Sudah format YYYY-MM-DD → langsung return
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // ISO string dengan timezone (mis. "2026-04-08T17:00:00.000Z")
  // Konversi ke waktu lokal device (WIB), bukan potong UTC mentah
  if (s.includes('T') || s.includes('Z')) {
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,'0');
      const dd = String(dt.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }
  }
  return s.slice(0, 10);
}

function todayLocal() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function nextDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function fRp(n) {
  if (!n || isNaN(n)) return 'Rp 0';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function parseRAB(text) {
  const lines = text.trim().split('\n');
  const items = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const p = line.split('\t');
    if (p.length >= 4) {
      const nama = p[0].trim();
      const qty  = parseFloat(p[1].replace(',','.')) || 0;
      const sat  = p[2].trim();
      const h    = parseInt(p[3].replace(/[^0-9]/g,'')) || 0;
      if (nama && qty > 0) items.push({nama, qty, satuan: sat, harga_jual: h, harga_beli: 0});
    }
  }
  return items;
}

function navItems(role) {
  if (role === 'admin')     return [{id:'dashboard',label:'Dashboard'},{id:'input_order',label:'Input Order'},{id:'rekap_beli',label:'Rekap & Tugas Beli'},{id:'surat_jalan',label:'Surat Jalan'},{id:'laporan',label:'Laporan'},{id:'kelola_akun',label:'Kelola Akun'}];
  if (role === 'staf_beli') return [{id:'tugas_beli',label:'Tugas Beli Hari Ini'},{id:'histori_beli',label:'Riwayat'}];
  if (role === 'staf_kirim')return [{id:'pengiriman',label:'Daftar Pengiriman'}];
  if (role === 'ceo' || role === 'sekretaris') return [{id:'laporan',label:'Laporan Harian'},{id:'laporan_dapur',label:'Per Dapur'},{id:'laporan_item',label:'Per Item'}];
  return [];
}

// =============================================
// API
// =============================================
const api = {
  async get(action, params = {}) {
    const qs = new URLSearchParams({action, ...params}).toString();
    const res = await fetch(`${SCRIPT_URL}?${qs}`);
    return res.json();
  },
  async post(body) {
    const res = await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify(body)});
    return res.json();
  }
};

// =============================================
// STYLES
// =============================================
const C = {
  card: {background:'#fff', border:'1px solid #e5e7eb', borderRadius:'10px', padding:'1rem 1.25rem'},
  met:  {background:'#f9fafb', borderRadius:'8px', padding:'1rem'},
  th:   {padding:'6px 8px', fontWeight:500, color:'#6b7280', fontSize:'12px', textAlign:'left'},
  td:   {padding:'7px 8px', fontSize:'13px', borderBottom:'1px solid #f3f4f6'},
};

function btn(v) {
  const base = {padding:'8px 16px', fontSize:'13px', fontWeight:500, borderRadius:'8px', cursor:'pointer', border:'none'};
  if (v === 'suc') return {...base, background:'#d1fae5', color:'#065f46'};
  if (v === 'pri') return {...base, background:'#dbeafe', color:'#1e40af'};
  if (v === 'war') return {...base, background:'#fef3c7', color:'#92400e'};
  if (v === 'dan') return {...base, background:'#fee2e2', color:'#991b1b'};
  return {...base, background:'transparent', color:'#6b7280', border:'1px solid #d1d5db'};
}

function bdg(v) {
  const base = {fontSize:'11px', padding:'2px 8px', borderRadius:'6px', fontWeight:500, display:'inline-block'};
  if (v === 'suc') return {...base, background:'#d1fae5', color:'#065f46'};
  if (v === 'war') return {...base, background:'#fef3c7', color:'#92400e'};
  if (v === 'dan') return {...base, background:'#fee2e2', color:'#991b1b'};
  return {...base, background:'#dbeafe', color:'#1e40af'};
}

function StatusBadge({status}) {
  if (status === 'delivered')     return <span style={bdg('suc')}>Terkirim</span>;
  if (status === 'pending_kirim') return <span style={bdg('war')}>Siap Kirim</span>;
  if (status === 'cancelled')     return <span style={bdg('dan')}>Dibatalkan</span>;
  return <span style={bdg('inf')}>Draft</span>;
}

function Spinner({text='Memuat...'}) {
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'3rem',gap:'8px',color:'#6b7280',fontSize:'13px'}}>
      <div style={{width:'16px',height:'16px',border:'2px solid #e5e7eb',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      {text}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// =============================================
// LOGIN
// =============================================
function Login({onLogin}) {
  const [u, setU] = useState('');
  const [p, setP] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [showPass, setShowPass] = useState(false);

  const handle = async () => {
    if (!u || !p) { setErr('Isi username dan password'); return; }
    setLoading(true); setErr('');
    try {
      const res = await api.get('login', {username: u, password: p});
      if (res.success) onLogin(res.user);
      else setErr(res.message || 'Username atau password salah');
    } catch(e) { setErr('Tidak bisa terhubung. Cek koneksi internet.'); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f3f4f6'}}>
      <div style={{...C.card, width:'100%', maxWidth:'340px', padding:'2rem'}}>
        <div style={{textAlign:'center', marginBottom:'2rem'}}>
          <div style={{width:'50px',height:'50px',borderRadius:'50%',background:'#d1fae5',color:'#065f46',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:'20px',fontWeight:700}}>K</div>
          <div style={{fontSize:'11px',color:'#9ca3af',marginBottom:'4px'}}>KOPERASI INSAN SINERGI SEJAHTERA</div>
          <div style={{fontSize:'17px',fontWeight:500}}>Sistem Manajemen Bahan</div>
        </div>
        <div style={{marginBottom:'12px'}}>
          <label style={{fontSize:'12px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Username</label>
          <input value={u} onChange={e=>setU(e.target.value)} placeholder="Masukkan username" style={{width:'100%',boxSizing:'border-box'}}/>
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={{fontSize:'12px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Password</label>
          <div style={{position:'relative'}}>
            <input type={showPass?'text':'password'} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} placeholder="Password" style={{width:'100%',boxSizing:'border-box',paddingRight:'40px'}}/>
            <button onClick={()=>setShowPass(x=>!x)} style={{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'14px',color:'#9ca3af',padding:'0'}}>
              {showPass ? '🙈' : '👁️'}
            </button>
          </div>
        </div>
        {err && <div style={{fontSize:'12px',color:'#991b1b',padding:'8px',background:'#fee2e2',borderRadius:'6px',marginBottom:'12px'}}>{err}</div>}
        <button onClick={handle} disabled={loading} style={{...btn('suc'),width:'100%',padding:'10px',fontSize:'14px',opacity:loading?0.6:1}}>
          {loading ? 'Masuk...' : 'Masuk'}
        </button>
      </div>
    </div>
  );
}

// =============================================
// DASHBOARD
// =============================================
function Dashboard({orders, loading, error, onRefresh, onCancelOrder, isAdmin}) {
  const [confirmId, setConfirmId] = useState(null);
  const tj = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
  const tb = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
  const confirmOrder = orders.find(o=>o.id===confirmId);
  const confirmDapur = DAPUR.find(d=>d.id===confirmOrder?.dapur_id);

  return (
    <div style={{padding:'1.5rem'}}>
      {confirmId && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
          <div style={{background:'#fff',borderRadius:'12px',padding:'1.5rem',maxWidth:'360px',width:'90%'}}>
            <div style={{fontSize:'30px',textAlign:'center',marginBottom:'10px'}}>⚠️</div>
            <div style={{fontSize:'15px',fontWeight:600,textAlign:'center',marginBottom:'8px'}}>Batalkan Order?</div>
            <div style={{fontSize:'13px',color:'#6b7280',textAlign:'center',marginBottom:'1.5rem',lineHeight:1.6}}>
              Order <strong>{confirmDapur?.nama}</strong> tgl <strong>{confirmOrder?.tanggal_kirim}</strong> akan dibatalkan.
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setConfirmId(null)} style={{...btn(),flex:1,padding:'9px'}}>Batal</button>
              <button onClick={()=>{onCancelOrder(confirmId);setConfirmId(null);}} style={{...btn('dan'),flex:1,padding:'9px',fontWeight:600}}>Ya, Batalkan</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h2>Dashboard</h2>
        <button onClick={onRefresh} style={{...btn(),padding:'6px 14px',fontSize:'12px'}}>↻ Refresh</button>
      </div>
      {error && <div style={{padding:'1rem',background:'#fee2e2',borderRadius:'8px',color:'#991b1b',fontSize:'13px',marginBottom:'1rem'}}>Gagal memuat: {error}</div>}
      {loading ? <Spinner/> : <>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:'10px',marginBottom:'1.5rem'}}>
          {[{l:'Total Order',v:orders.length+' order'},{l:'Total Penjualan',v:fRp(tj)},{l:'Total Pembelian',v:fRp(tb)},{l:'Profit',v:fRp(tj-tb)}].map(c=>(
            <div key={c.l} style={C.met}><div style={{fontSize:'11px',color:'#6b7280',marginBottom:'4px'}}>{c.l}</div><div style={{fontSize:'16px',fontWeight:500}}>{c.v}</div></div>
          ))}
        </div>
        <div style={C.card}>
          <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Semua Order</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%'}}>
              <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                {['Dapur','Tgl Order','Tgl Kirim','Item','Nilai Jual','Status',isAdmin?'Aksi':''].map((h,i)=>(
                  <th key={i} style={{...C.th,textAlign:i===4?'right':'left'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {orders.map(o=>{
                  const d = DAPUR.find(x=>x.id===o.dapur_id);
                  const n = o.items.reduce((s,i)=>s+i.qty*i.harga_jual,0);
                  const canCancel = isAdmin && o.status!=='delivered' && o.status!=='cancelled';
                  return (
                    <tr key={o.id} style={{opacity:o.status==='cancelled'?0.45:1}}>
                      <td style={C.td}>{d?.nama}</td>
                      <td style={{...C.td,color:'#6b7280'}}>{normDate(o.tanggal_order)}</td>
                      <td style={{...C.td,color:'#6b7280'}}>{normDate(o.tanggal_kirim)}</td>
                      <td style={{...C.td,color:'#6b7280'}}>{o.items.length} item</td>
                      <td style={{...C.td,textAlign:'right',textDecoration:o.status==='cancelled'?'line-through':''}}>{fRp(n)}</td>
                      <td style={C.td}><StatusBadge status={o.status}/></td>
                      {isAdmin && <td style={C.td}>{canCancel && <button onClick={()=>setConfirmId(o.id)} style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>Batalkan</button>}</td>}
                    </tr>
                  );
                })}
                {!orders.length && <tr><td colSpan={7} style={{...C.td,textAlign:'center',color:'#9ca3af'}}>Belum ada order</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </>}
    </div>
  );
}

// =============================================
// INPUT ORDER
// =============================================
function InputOrder({onOrderAdded, setView}) {
  const [step, setStep] = useState(1);
  const [selDapur, setSelDapur] = useState('');
  const [rabText, setRabText] = useState('');
  const [items, setItems] = useState([]);
  const [tO, setTO] = useState(todayLocal());
  const [tK, setTK] = useState(nextDay(todayLocal()));
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  const handleParse = () => {
    const it = parseRAB(rabText);
    if (!it.length) { setErr('Format tidak dikenali. Pastikan copy langsung dari spreadsheet (tab-separated).'); return; }
    setErr(''); setItems(it); setStep(3);
  };

  const updItem = (idx, f, v) => setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:f==='qty'?parseFloat(v)||0:parseInt(v)||0}:it));

  const handleSubmit = async () => {
    setSaving(true);
    const order = {id:'ord-'+Date.now(), dapur_id:selDapur, tanggal_order:tO, tanggal_kirim:tK, status:'draft', items};
    try {
      const res = await api.post({action:'addOrder', order});
      if (res.success) { onOrderAdded(order); alert('Order berhasil disimpan!'); setView('dashboard'); }
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setSaving(false);
  };

  const totalJual = items.reduce((s,i)=>s+i.qty*i.harga_jual, 0);
  const steps = ['Pilih Dapur','Paste RAB','Review & Submit'];

  return (
    <div style={{padding:'1.5rem',maxWidth:'820px'}}>
      <h2 style={{marginBottom:'1rem'}}>Input Order Baru</h2>
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'1.5rem'}}>
        {steps.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{width:'22px',height:'22px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,background:step>i+1?'#d1fae5':step===i+1?'#dbeafe':'#f3f4f6',color:step>i+1?'#065f46':step===i+1?'#1e40af':'#9ca3af'}}>{step>i+1?'✓':i+1}</div>
            <span style={{fontSize:'12px',color:step===i+1?'#111':'#9ca3af'}}>{s}</span>
            {i<2 && <span style={{color:'#9ca3af'}}>›</span>}
          </div>
        ))}
      </div>
      <div style={C.card}>
        {step===1 && (
          <div>
            <div style={{display:'flex',gap:'16px',marginBottom:'1rem'}}>
              <div><label style={{fontSize:'12px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Tanggal Order</label><input type="date" value={tO} onChange={e=>{setTO(e.target.value);setTK(nextDay(e.target.value));}}/></div>
              <div><label style={{fontSize:'12px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Tanggal Kirim</label><input type="date" value={tK} onChange={e=>setTK(e.target.value)}/></div>
            </div>
            <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'8px'}}>Pilih Dapur</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'1.25rem'}}>
              {DAPUR.map(d=>(
                <button key={d.id} onClick={()=>setSelDapur(d.id)} style={{padding:'12px',textAlign:'left',background:selDapur===d.id?'#dbeafe':'#f9fafb',border:selDapur===d.id?'1.5px solid #93c5fd':'1px solid #e5e7eb',borderRadius:'8px',cursor:'pointer'}}>
                  <div style={{fontSize:'14px',fontWeight:500,color:selDapur===d.id?'#1e40af':'#111'}}>{d.nama}</div>
                  <div style={{fontSize:'12px',color:'#6b7280',marginTop:'2px'}}>{d.pic}</div>
                </button>
              ))}
            </div>
            <button disabled={!selDapur} onClick={()=>setStep(2)} style={{...btn('pri'),opacity:selDapur?1:0.4}}>Lanjut →</button>
          </div>
        )}
        {step===2 && (
          <div>
            <div style={{fontSize:'13px',marginBottom:'12px'}}>Dapur: <strong>{DAPUR.find(d=>d.id===selDapur)?.nama}</strong></div>
            <div style={{fontSize:'11px',padding:'8px',background:'#f9fafb',borderRadius:'6px',marginBottom:'8px',color:'#6b7280',fontFamily:'monospace'}}>Format: Bahan [Tab] Banyak [Tab] Satuan [Tab] Harga — copy dari spreadsheet</div>
            <textarea value={rabText} onChange={e=>setRabText(e.target.value)} placeholder={"Beras Premium\t100.8\tKg\tRp15,000\nAyam Broiler\t200\tKg\tRp35,000"} style={{width:'100%',minHeight:'200px',fontFamily:'monospace',fontSize:'12px',resize:'vertical',boxSizing:'border-box'}}/>
            {err && <div style={{color:'#991b1b',fontSize:'12px',marginTop:'6px',padding:'8px',background:'#fee2e2',borderRadius:'6px'}}>{err}</div>}
            <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
              <button onClick={()=>setStep(1)} style={btn()}>← Kembali</button>
              <button disabled={!rabText.trim()} onClick={handleParse} style={{...btn('pri'),opacity:rabText.trim()?1:0.4}}>Parse & Review →</button>
            </div>
          </div>
        )}
        {step===3 && (
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
              <div style={{fontSize:'13px'}}>Dapur: <strong>{DAPUR.find(d=>d.id===selDapur)?.nama}</strong> · Kirim: <strong>{tK}</strong></div>
              <div style={{fontSize:'12px',color:'#6b7280'}}>{items.length} item</div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',fontSize:'13px'}}>
                <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                  {['Bahan','Qty','Sat','Harga Jual/Sat','Subtotal',''].map((h,i)=><th key={i} style={{...C.th,textAlign:i>=3&&i<5?'right':'left'}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {items.map((it,idx)=>(
                    <tr key={idx} style={{borderBottom:'1px solid #f3f4f6'}}>
                      <td style={{padding:'6px 4px'}}>{it.nama}</td>
                      <td style={{padding:'6px 4px'}}><input type="number" value={it.qty} onChange={e=>updItem(idx,'qty',e.target.value)} style={{width:'65px',textAlign:'right',padding:'4px',fontSize:'12px'}}/></td>
                      <td style={{padding:'6px 4px',color:'#6b7280',fontSize:'12px'}}>{it.satuan}</td>
                      <td style={{padding:'6px 4px',textAlign:'right'}}><input type="number" value={it.harga_jual} onChange={e=>updItem(idx,'harga_jual',e.target.value)} style={{width:'100px',textAlign:'right',padding:'4px',fontSize:'12px'}}/></td>
                      <td style={{padding:'6px 4px',textAlign:'right',fontWeight:500}}>{fRp(it.qty*it.harga_jual)}</td>
                      <td style={{padding:'6px 4px'}}><button onClick={()=>setItems(p=>p.filter((_,i)=>i!==idx))} style={{fontSize:'14px',color:'#991b1b',background:'none',border:'none',cursor:'pointer',padding:'0 4px'}}>×</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot><tr style={{borderTop:'1px solid #d1d5db'}}>
                  <td colSpan={4} style={{padding:'8px 4px',textAlign:'right',fontWeight:500}}>Total Penjualan:</td>
                  <td style={{padding:'8px 4px',textAlign:'right',fontWeight:600,fontSize:'14px'}}>{fRp(totalJual)}</td>
                  <td></td>
                </tr></tfoot>
              </table>
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'1rem'}}>
              <button onClick={()=>setStep(2)} style={btn()}>← Kembali</button>
              <button onClick={handleSubmit} disabled={saving} style={{...btn('suc'),opacity:saving?0.6:1}}>{saving?'Menyimpan...':'Simpan Order ✓'}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================
// REKAP & TUGAS BELI
// =============================================
function RekapBeli({orders, tugasBeli, stafBeli, allUsers, onTugasSaved}) {
  const [sd, setSd]    = useState(todayLocal());
  const [asgn, setAsgn] = useState({});
  const [saving, setSaving] = useState(false);
  const [tab, setTab]  = useState('bagi');

  const ri = useMemo(()=>{
    const ro = orders.filter(o=>(o.status==='draft'||o.status==='pending_kirim') && normDate(o.tanggal_kirim)===sd);
    const m = {};
    for (const o of ro) for (const it of o.items) {
      const k = (it.nama||it.nama_bahan)+'|'+it.satuan;
      const nama = it.nama||it.nama_bahan;
      if (!m[k]) m[k] = {nama, satuan:it.satuan, total:0, ords:[]};
      m[k].total += it.qty;
      m[k].ords.push({dapur: DAPUR.find(d=>d.id===o.dapur_id)?.nama, qty:it.qty});
    }
    return Object.values(m).sort((a,b)=>a.nama.localeCompare(b.nama));
  }, [orders, sd]);

  const tugasHariIni = tugasBeli.filter(t => normDate(t.tanggal) === sd);
  const totalT  = tugasHariIni.length;
  const sudahBeli = tugasHariIni.filter(t=>t.status==='bought'||t.status==='done').length;
  const hargaOk = tugasHariIni.filter(t=>t.status==='done').length;
  const belum   = totalT - sudahBeli;

  const getNama = (stafId) => {
    const u = (allUsers||[]).find(x=>x.username===stafId||x.id===stafId);
    return u ? u.name : stafId;
  };

  // Multi-staff helpers
  const getAssignments = (nama) => asgn[nama] || [];
  const addAssignment = (nama, total) => {
    setAsgn(p => {
      const cur = p[nama] || [];
      const used = cur.reduce((s,a)=>s+(parseFloat(a.qty)||0),0);
      const remaining = total - used;
      return {...p, [nama]: [...cur, {staf:'', qty: remaining > 0 ? remaining : 0}]};
    });
  };
  const removeAssignment = (nama, idx) => {
    setAsgn(p => ({...p, [nama]: (p[nama]||[]).filter((_,i)=>i!==idx)}));
  };
  const updateAssignment = (nama, idx, field, value) => {
    setAsgn(p => ({...p, [nama]: (p[nama]||[]).map((a,i)=>i===idx?{...a,[field]:value}:a)}));
  };

  const handleSave = async () => {
    const tugas = [];
    for (const it of ri) {
      const assignments = getAssignments(it.nama);
      for (const a of assignments) {
        if (!a.staf) continue;
        tugas.push({
          id:'tgs-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
          tanggal: sd,
          staf_id: a.staf,
          nama_bahan: it.nama,
          qty: parseFloat(a.qty)||0,
          satuan: it.satuan,
          harga_beli: 0,
          status: 'pending'
        });
      }
    }
    if (!tugas.length) { alert('Pilih staf untuk minimal satu item'); return; }
    setSaving(true);
    try {
      const res = await api.post({action:'saveTugasBeli', tugas, tanggal:sd});
      if (res.success) { onTugasSaved(tugas, sd); alert('Tugas tersimpan! '+tugas.length+' penugasan.'); }
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setSaving(false);
  };

  const handleWA = () => {
    const lines = ['*Tugas Beli Bahan - '+sd+'*', ''];
    const byStaf = {};
    for (const it of ri) {
      const assignments = getAssignments(it.nama);
      for (const a of assignments) {
        if (!a.staf) continue;
        const sn = stafBeli.find(s=>s.id===a.staf)?.nama || a.staf;
        if (!byStaf[sn]) byStaf[sn] = [];
        byStaf[sn].push(`• ${it.nama}: ${parseFloat(a.qty)||it.total} ${it.satuan}`);
      }
    }
    for (const [sn, its] of Object.entries(byStaf)) { lines.push(`*${sn}:*`); its.forEach(x=>lines.push(x)); lines.push(''); }
    if (navigator.clipboard) navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Teks WA disalin!'));
  };

  const tsIcon = (s) => {
    if (s==='done')   return <span style={bdg('suc')}>Harga ✓</span>;
    if (s==='bought') return <span style={bdg('war')}>Sudah beli</span>;
    return <span style={{...bdg('inf'),background:'#f3f4f6',color:'#6b7280'}}>Belum</span>;
  };

  return (
    <div style={{padding:'1.5rem',maxWidth:'980px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
        <h2>Rekap &amp; Tugas Beli</h2>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <label style={{fontSize:'12px',color:'#6b7280'}}>Tgl Kirim:</label>
          <input type="date" value={sd} onChange={e=>setSd(e.target.value)}/>
        </div>
      </div>

      {totalT > 0 && (
        <div style={{...C.card, marginBottom:'1rem', border:belum>0?'1px solid #fde68a':'1px solid #a7f3d0', background:belum>0?'#fffbeb':'#f0fdf4'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
            <div style={{fontSize:'13px',fontWeight:500,color:belum>0?'#92400e':'#065f46'}}>
              {belum>0 ? `⚠️ ${belum} item belum dibeli` : '✅ Semua item sudah dibeli!'}
            </div>
            <div style={{fontSize:'12px',color:'#6b7280'}}>{hargaOk}/{totalT} harga terisi</div>
          </div>
          <div style={{height:'6px',background:'#e5e7eb',borderRadius:'3px',overflow:'hidden'}}>
            <div style={{height:'100%',background:'#065f46',borderRadius:'3px',width:`${totalT>0?(hargaOk/totalT)*100:0}%`}}/>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:'4px',marginBottom:'1rem',borderBottom:'1px solid #e5e7eb'}}>
        {[['bagi','Bagi Tugas'],['monitor','Monitor Status']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:'8px 16px',fontSize:'13px',fontWeight:tab===id?500:400,border:'none',background:'transparent',cursor:'pointer',borderBottom:tab===id?'2px solid #1e40af':'2px solid transparent',color:tab===id?'#1e40af':'#6b7280',marginBottom:'-1px'}}>
            {lbl}{id==='monitor'&&belum>0&&<span style={{...bdg('war'),fontSize:'10px',marginLeft:'4px',padding:'1px 6px'}}>{belum}</span>}
          </button>
        ))}
      </div>

      {tab==='bagi' && (
        !ri.length ? (
          <div style={{...C.met,padding:'2rem',textAlign:'center',color:'#6b7280'}}>Tidak ada order aktif untuk tanggal {sd}</div>
        ) : (
          <>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {ri.map(it=>{
                const assignments = getAssignments(it.nama);
                const usedQty = assignments.reduce((s,a)=>s+(parseFloat(a.qty)||0),0);
                const remaining = it.total - usedQty;
                return (
                  <div key={it.nama} style={{...C.card,border:'1px solid #e5e7eb'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:'14px'}}>{it.nama}</div>
                        <div style={{fontSize:'12px',color:'#6b7280',marginTop:'2px'}}>Total: <strong style={{color:'#1e40af'}}>{it.total} {it.satuan}</strong> · {it.ords.map(o=>`${o.dapur}: ${o.qty}`).join(' · ')}</div>
                      </div>
                      <button onClick={()=>addAssignment(it.nama, it.total)} style={{...btn('pri'),padding:'4px 10px',fontSize:'11px',whiteSpace:'nowrap'}}>+ Staf</button>
                    </div>
                    {assignments.length > 0 && (
                      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                        {assignments.map((a,idx)=>(
                          <div key={idx} style={{display:'flex',gap:'8px',alignItems:'center',padding:'6px 8px',background:'#f9fafb',borderRadius:'6px'}}>
                            <select value={a.staf} onChange={e=>updateAssignment(it.nama,idx,'staf',e.target.value)} style={{fontSize:'12px',padding:'5px',flex:'1',minWidth:'100px'}}>
                              <option value="">— Pilih Staf —</option>
                              {stafBeli.map(s=><option key={s.id} value={s.id}>{s.nama}</option>)}
                            </select>
                            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                              <input type="number" value={a.qty} onChange={e=>updateAssignment(it.nama,idx,'qty',e.target.value)} style={{width:'75px',textAlign:'right',padding:'5px',fontSize:'12px'}}/>
                              <span style={{fontSize:'11px',color:'#6b7280'}}>{it.satuan}</span>
                            </div>
                            <button onClick={()=>removeAssignment(it.nama,idx)} style={{fontSize:'16px',color:'#991b1b',background:'none',border:'none',cursor:'pointer',padding:'0 4px',lineHeight:1}}>×</button>
                          </div>
                        ))}
                        {Math.abs(remaining) > 0.01 && (
                          <div style={{fontSize:'11px',color:remaining>0?'#92400e':'#991b1b',padding:'2px 8px'}}>
                            {remaining > 0 ? `⚠️ Sisa ${remaining.toFixed(1)} ${it.satuan} belum ditugaskan` : `⚠️ Kelebihan ${Math.abs(remaining).toFixed(1)} ${it.satuan}`}
                          </div>
                        )}
                      </div>
                    )}
                    {assignments.length === 0 && (
                      <div style={{fontSize:'12px',color:'#9ca3af',fontStyle:'italic'}}>Klik "+ Staf" untuk menugaskan pembelian</div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'1rem'}}>
              <button onClick={handleSave} disabled={saving} style={{...btn('suc'),opacity:saving?0.6:1}}>{saving?'Menyimpan...':'Simpan Tugas Beli'}</button>
              <button onClick={handleWA} style={btn('war')}>Salin Teks WA</button>
            </div>
          </>
        )
      )}

      {tab==='monitor' && (
        !tugasHariIni.length ? (
          <div style={{...C.met,padding:'2rem',textAlign:'center',color:'#6b7280'}}>Belum ada tugas untuk tanggal {sd}.</div>
        ) : (
          <div style={C.card}>
            <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Status Pembelian — {tugasHariIni.length} item</div>
            <table style={{width:'100%'}}>
              <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                {['Staf','Bahan','Qty','Status','Harga Beli'].map((h,i)=>(
                  <th key={i} style={{...C.th,textAlign:i>=3?'right':'left'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {tugasHariIni.map(t=>(
                  <tr key={t.id} style={{borderBottom:'1px solid #f9fafb'}}>
                    <td style={{...C.td,fontWeight:500}}>{getNama(t.staf_id)}</td>
                    <td style={C.td}>{t.nama_bahan}</td>
                    <td style={{...C.td,color:'#6b7280'}}>{t.qty} {t.satuan}</td>
                    <td style={{...C.td,textAlign:'right'}}>{tsIcon(t.status)}</td>
                    <td style={{...C.td,textAlign:'right',fontWeight:500,color:t.status==='done'?'#065f46':'#9ca3af'}}>
                      {t.status==='done' ? fRp(t.harga_beli) : '—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      )}
    </div>
  );
}

// =============================================
// TUGAS BELI (Staf)
// =============================================
function TugasBeli({user, tugasBeli, allUsers, onStatusChanged, onHargaSaved}) {
  const [hi, setHi]       = useState({});
  const [saving, setSaving] = useState({});
  const [konfirm, setKonfirm] = useState({});
  const [selDate, setSelDate] = useState(todayLocal());
  const today = todayLocal();

  // Filter tugas berdasarkan tanggal yang dipilih
  const semuaTugas = tugasBeli.filter(t => normDate(t.tanggal) === selDate);
  const myTugas    = semuaTugas.filter(t => String(t.staf_id) === String(user.u));
  const otherTugas = semuaTugas.filter(t => String(t.staf_id) !== String(user.u));

  const total  = semuaTugas.length;
  const bought = semuaTugas.filter(t=>t.status==='bought'||t.status==='done').length;
  const done   = semuaTugas.filter(t=>t.status==='done').length;

  // Cari tanggal-tanggal yang punya tugas untuk navigasi cepat
  const availDates = useMemo(()=>{
    const ds = new Set();
    tugasBeli.forEach(t=>{ const d=normDate(t.tanggal); if(d) ds.add(d); });
    return [...ds].sort().reverse();
  },[tugasBeli]);

  const getNama = (stafId) => {
    const u = (allUsers||[]).find(x=>x.username===stafId||x.id===stafId);
    return u ? u.name : stafId;
  };

  const prevDay = () => {
    const d = new Date(selDate+'T00:00:00'); d.setDate(d.getDate()-1);
    setSelDate(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  };
  const nextDayNav = () => {
    const d = new Date(selDate+'T00:00:00'); d.setDate(d.getDate()+1);
    setSelDate(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  };

  const handleBeli = async (t) => {
    setKonfirm(p=>({...p,[t.id]:true}));
    try {
      const res = await api.post({action:'updateTugasStatus', tugasId:t.id, status:'bought'});
      if (res.success) onStatusChanged(t.id, 'bought');
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setKonfirm(p=>({...p,[t.id]:false}));
  };

  const handleHarga = async (id) => {
    const h = parseFloat(hi[id])||0;
    if (h<=0) { alert('Masukkan harga yang valid'); return; }
    setSaving(p=>({...p,[id]:true}));
    try {
      const res = await api.post({action:'updateHargaBeli', tugasId:id, hargaBeli:h});
      if (res.success) onHargaSaved(id, h);
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setSaving(p=>({...p,[id]:false}));
  };

  const statusIcon = (s) => {
    if (s==='done')   return <span style={bdg('suc')}>Selesai ✓</span>;
    if (s==='bought') return <span style={bdg('war')}>Sudah dibeli</span>;
    return <span style={bdg('inf')}>Belum beli</span>;
  };

  return (
    <div style={{padding:'1.5rem',maxWidth:'720px'}}>
      <h2 style={{marginBottom:'4px'}}>Tugas Beli</h2>
      <div style={{fontSize:'13px',color:'#6b7280',marginBottom:'1rem'}}>Halo {user.name}!</div>

      <div style={{...C.card,marginBottom:'1rem',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
        <button onClick={prevDay} style={{...btn(),padding:'6px 12px',fontSize:'16px'}}>‹</button>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flex:1,justifyContent:'center'}}>
          <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{fontSize:'13px'}}/>
          {selDate===today && <span style={{...bdg('suc'),fontSize:'10px'}}>Hari ini</span>}
          {selDate!==today && <button onClick={()=>setSelDate(today)} style={{fontSize:'11px',color:'#1e40af',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Hari ini</button>}
        </div>
        <button onClick={nextDayNav} style={{...btn(),padding:'6px 12px',fontSize:'16px'}}>›</button>
      </div>

      {availDates.length > 0 && (
        <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'1rem'}}>
          {availDates.slice(0,7).map(d=>(
            <button key={d} onClick={()=>setSelDate(d)} style={{padding:'3px 8px',fontSize:'11px',borderRadius:'12px',border:d===selDate?'1.5px solid #3b82f6':'1px solid #e5e7eb',background:d===selDate?'#dbeafe':'#fff',color:d===selDate?'#1e40af':'#6b7280',cursor:'pointer'}}>
              {d===today?'Hari ini':d.slice(5)}
              {tugasBeli.filter(t=>normDate(t.tanggal)===d&&String(t.staf_id)===String(user.u)&&t.status!=='done').length > 0 && <span style={{color:'#dc2626'}}> •</span>}
            </button>
          ))}
        </div>
      )}

      {total > 0 && (
        <div style={{...C.card,marginBottom:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
            <span style={{fontSize:'13px',fontWeight:500}}>Progress {selDate===today?'hari ini':selDate.slice(5)}</span>
            <span style={{fontSize:'12px',color:'#6b7280'}}>{done}/{total} selesai</span>
          </div>
          <div style={{height:'8px',background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',marginBottom:'8px'}}>
            <div style={{height:'100%',background:'#065f46',borderRadius:'4px',width:`${total>0?(done/total)*100:0}%`}}/>
          </div>
          <div style={{display:'flex',gap:'12px',fontSize:'11px',color:'#6b7280'}}>
            <span>⬜ Belum: {total-bought}</span>
            <span>🟡 Sudah beli: {bought-done}</span>
            <span>✅ Harga terisi: {done}</span>
          </div>
        </div>
      )}

      {!myTugas.length ? (
        <div style={{...C.met,padding:'2rem',textAlign:'center',color:'#6b7280',marginBottom:'1rem'}}>Belum ada tugas untuk tanggal {selDate}.</div>
      ) : (
        <>
          <div style={{fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'8px'}}>Tugasmu ({myTugas.length} item)</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'1.5rem'}}>
            {myTugas.map(t=>(
              <div key={t.id} style={{...C.card,border:t.status==='done'?'1px solid #a7f3d0':t.status==='bought'?'1px solid #fde68a':'1px solid #e5e7eb'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:t.status==='pending'||t.status==='bought'?'10px':'0'}}>
                  <div>
                    <div style={{fontWeight:500,marginBottom:'2px'}}>{t.nama_bahan}</div>
                    <div style={{fontSize:'12px',color:'#6b7280'}}>{t.qty} {t.satuan}</div>
                  </div>
                  {statusIcon(t.status)}
                </div>
                {t.status==='pending' && (
                  <button onClick={()=>handleBeli(t)} disabled={konfirm[t.id]} style={{...btn('pri'),width:'100%',padding:'9px',opacity:konfirm[t.id]?0.6:1}}>
                    {konfirm[t.id]?'Menyimpan...':'✓ Konfirmasi Sudah Beli di Pasar'}
                  </button>
                )}
                {t.status==='bought' && (
                  <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:'11px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Harga beli per {t.satuan} (Rp):</label>

// LAPORAN
// =============================================
function Laporan({orders}) {
  const tj = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
  const tb = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
  const pf = tj - tb;
  const mg = tj>0?((pf/tj)*100).toFixed(1):0;

  const perDapur = DAPUR.map(d=>{
    const dos = orders.filter(o=>o.dapur_id===d.id);
    const j = dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
    const b = dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
    return {nama:d.nama, ords:dos.length, j, b, pf:j-b};
  });

  const im = {};
  for (const o of orders) for (const it of o.items) {
    if (!im[it.nama]) im[it.nama] = {nama:it.nama, qty:0, j:0, b:0};
    im[it.nama].qty += it.qty; im[it.nama].j += it.qty*it.harga_jual; im[it.nama].b += it.qty*it.harga_beli;
  }
  const perItem = Object.values(im).map(x=>({...x,pf:x.j-x.b})).sort((a,b)=>b.pf-a.pf);

  return (
    <div style={{padding:'1.5rem',maxWidth:'960px'}}>
      <h2 style={{marginBottom:'1.5rem'}}>Laporan Keuangan</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:'10px',marginBottom:'1.5rem'}}>
        {[{l:'Total Penjualan',v:fRp(tj)},{l:'Total Pembelian',v:fRp(tb)},{l:'Total Profit',v:fRp(pf)},{l:'Margin',v:mg+'%'}].map(c=>(
          <div key={c.l} style={C.met}><div style={{fontSize:'11px',color:'#6b7280',marginBottom:'4px'}}>{c.l}</div><div style={{fontSize:'16px',fontWeight:500}}>{c.v}</div></div>
        ))}
      </div>
      <div style={{...C.card,marginBottom:'1rem'}}>
        <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Per Dapur</div>
        <table style={{width:'100%'}}>
          <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>{['Dapur','Order','Penjualan','Pembelian','Profit','Margin'].map((h,i)=><th key={i} style={{...C.th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead>
          <tbody>{perDapur.map(d=>(
            <tr key={d.nama} style={{borderBottom:'1px solid #f3f4f6'}}>
              <td style={C.td}>{d.nama}</td><td style={C.td}>{d.ords}</td>
              <td style={{...C.td,textAlign:'right'}}>{fRp(d.j)}</td>
              <td style={{...C.td,textAlign:'right'}}>{fRp(d.b)}</td>
              <td style={{...C.td,textAlign:'right',fontWeight:600,color:d.pf>=0?'#065f46':'#991b1b'}}>{fRp(d.pf)}</td>
              <td style={{...C.td,textAlign:'right',color:'#6b7280'}}>{d.j>0?((d.pf/d.j)*100).toFixed(1):0}%</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={C.card}>
        <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Per Item — profit tertinggi</div>
        <table style={{width:'100%'}}>
          <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>{['Bahan','Qty','Penjualan','Pembelian','Profit'].map((h,i)=><th key={i} style={{...C.th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead>
          <tbody>{perItem.map(it=>(
            <tr key={it.nama} style={{borderBottom:'1px solid #f3f4f6'}}>
              <td style={C.td}>{it.nama}</td><td style={C.td}>{it.qty}</td>
              <td style={{...C.td,textAlign:'right'}}>{fRp(it.j)}</td>
              <td style={{...C.td,textAlign:'right'}}>{fRp(it.b)}</td>
              <td style={{...C.td,textAlign:'right',fontWeight:600,color:it.pf>=0?'#065f46':'#991b1b'}}>{fRp(it.pf)}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function KelolaAkun({allUsers, onUsersChanged}) {
  const allowedRoles = ['staf_beli','staf_kirim'];
  const users = (allUsers||[]).filter(u=>allowedRoles.includes(u.role));
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving]     = useState(false);
  const [showPassMap, setShowPassMap] = useState({});
  const [delConfirm, setDelConfirm]   = useState(null);
  const [deleting, setDeleting]       = useState(false);
  const [form, setForm] = useState({name:'',username:'',password:'',role:'staf_beli'});
  const [formErr, setFormErr]   = useState('');
  const [showNewPass, setShowNewPass] = useState(false);

  const roleLabel = {staf_beli:'Staf Pembelian',staf_kirim:'Staf Pengiriman'};
  const roleBg    = {staf_beli:'#d1fae5',staf_kirim:'#fef3c7'};
  const roleColor = {staf_beli:'#065f46',staf_kirim:'#92400e'};

  const validate = () => {
    if (!form.name.trim())           return 'Nama wajib diisi';
    if (!form.username.trim())       return 'Username wajib diisi';
    if (form.username.includes(' ')) return 'Username tidak boleh ada spasi';
    if (form.password.length < 4)    return 'Password minimal 4 karakter';
    if ((allUsers||[]).find(u=>u.username===form.username)) return 'Username sudah dipakai';
    return '';
  };

  const handleSave = async () => {
    const err = validate();
    if (err) { setFormErr(err); return; }
    setSaving(true); setFormErr('');
    try {
      const newUser = {id:'u-'+Date.now(), ...form};
      const res = await api.post({action:'addUser', user:newUser});
      if (res.success) {
        onUsersChanged(prev=>[...prev, newUser]);
        setForm({name:'',username:'',password:'',role:'staf_beli'});
        setShowForm(false); setShowNewPass(false);
      } else setFormErr(res.error || 'Gagal menyimpan');
    } catch(e) { setFormErr('Koneksi bermasalah'); }
    setSaving(false);
  };

  const handleDelete = async (userId) => {
    setDeleting(true);
    try {
      const res = await api.post({action:'deleteUser', userId});
      if (res.success) { onUsersChanged(prev=>prev.filter(u=>u.id!==userId)); setDelConfirm(null); }
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setDeleting(false);
  };

  const delUser = users.find(u=>u.id===delConfirm);

            <div style={{fontSize:'13px',color:'#6b7280',textAlign:'center',marginBottom:'1.5rem',lineHeight:1.6}}>
              Akun <strong>{delUser?.name}</strong> ({delUser?.username}) akan dihapus permanen.

            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setDelConfirm(null)} style={{...btn(),flex:1,padding:'9px'}}>Batal</button>
              <button onClick={()=>handleDelete(delConfirm)} disabled={deleting} style={{...btn('dan'),flex:1,padding:'9px',opacity:deleting?0.6:1}}>
                {deleting?'Menghapus...':'Hapus'}

          {formErr && <div style={{fontSize:'12px',color:'#991b1b',padding:'8px',background:'#fee2e2',borderRadius:'6px',marginBottom:'12px'}}>{formErr}</div>}
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>{setShowForm(false);setFormErr('');}} style={btn()}>Batal</button>
            <button onClick={handleSave} disabled={saving} style={{...btn('suc'),opacity:saving?0.6:1}}>{saving?'Menyimpan...':'Simpan Akun ✓'}</button>
          </div>
        </div>
      )}

      <div style={C.card}>
        <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Daftar Akun Staf ({users.length} akun)</div>
        {!users.length ? (
          <div style={{padding:'2rem',textAlign:'center',color:'#9ca3af',fontSize:'13px'}}>Belum ada akun staf. Buat akun baru di atas.</div>
        ) : (
          <table style={{width:'100%'}}>
            <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>{['Nama','Username','Password','Role',''].map((h,i)=><th key={i} style={C.th}>{h}</th>)}</tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id} style={{borderBottom:'1px solid #f3f4f6'}}>
                  <td style={{...C.td,fontWeight:500}}>{u.name}</td>
                  <td style={{...C.td,fontFamily:'monospace',fontSize:'12px'}}>{u.username}</td>
                  <td style={C.td}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <span style={{fontFamily:'monospace',fontSize:'12px',minWidth:'72px'}}>{showPassMap[u.id]?u.password:'••••••'}</span>
                      <button onClick={()=>setShowPassMap(p=>({...p,[u.id]:!p[u.id]}))} style={{background:'none',border:'none',cursor:'pointer',fontSize:'13px',color:'#9ca3af',padding:'0',lineHeight:1}}>{showPassMap[u.id]?'🙈':'👁️'}</button>
                    </div>
                  </td>
                  <td style={C.td}><span style={{...bdg(),background:roleBg[u.role]||'#f3f4f6',color:roleColor[u.role]||'#374151'}}>{roleLabel[u.role]||u.role}</span></td>
                  <td style={C.td}><button onClick={()=>setDelConfirm(u.id)} style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>Hapus</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// =============================================
// MAIN APP
// =============================================
function App() {
  const [user, setUser]         = useState(()=>{
    try {
      const saved = localStorage.getItem('koperasi_session');
      if (saved) {
        const {user: u, ts} = JSON.parse(saved);
        if (Date.now() - ts < 30 * 60 * 1000) return u; // 30 menit
        localStorage.removeItem('koperasi_session');
      }
    } catch(e){}
    return null;
  });
  const [view, setView]         = useState('dashboard');
  const [orders, setOrders]     = useState([]);
  const [tugas, setTugas]       = useState([]);
  const [pngrm, setPngrm]       = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState(null);

  // Refresh session timestamp setiap interaksi
  useEffect(()=>{
    if (!user) return;
    const refresh = () => {
      try { localStorage.setItem('koperasi_session', JSON.stringify({user, ts: Date.now()})); } catch(e){}
    };
    refresh();
    const events = ['click','keydown','scroll','touchstart'];
    events.forEach(e => window.addEventListener(e, refresh, {passive:true}));
    return () => events.forEach(e => window.removeEventListener(e, refresh));
  },[user]);

  const stafBeli = allUsers.filter(x=>x.role==='staf_beli').map(x=>({id:x.username, nama:x.name}));

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [o, t, p, u] = await Promise.all([
        api.get('getOrders'),
        api.get('getTugasBeli'),
        api.get('getPengiriman'),
        api.get('getUsers'),
      ]);
      if (!Array.isArray(o)) throw new Error(o.error || 'getOrders gagal');
      setOrders(o);
      setTugas(Array.isArray(t) ? t : []);
      setPngrm(Array.isArray(p) ? p : []);
      setAllUsers(Array.isArray(u) ? u : []);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { if (user) loadAll(); }, [user, loadAll]);

  const login  = u => { try{localStorage.setItem('koperasi_session',JSON.stringify({user:u,ts:Date.now()}))}catch(e){} setUser(u); setView(navItems(u.role)[0]?.id || 'dashboard'); };
  const logout = () => { localStorage.removeItem('koperasi_session'); setUser(null); setOrders([]); setTugas([]); setPngrm([]); setAllUsers([]); setError(null); };
  const isAdmin = user?.role === 'admin';

  const handleCancelOrder = (orderId) => {
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:'cancelled'}:o));
    api.post({action:'updateOrderStatus', orderId, status:'cancelled'});
  };

  if (!user) return <Login onLogin={login}/>;

  const renderView = () => {
    switch(view) {
      case 'dashboard':
        return <Dashboard orders={orders} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={handleCancelOrder} isAdmin={isAdmin}/>;
      case 'input_order':
        return <InputOrder onOrderAdded={o=>setOrders(p=>[...p,o])} setView={setView}/>;
      case 'rekap_beli':
        return <RekapBeli orders={orders} tugasBeli={tugas} stafBeli={stafBeli} allUsers={allUsers} onTugasSaved={(t,tgl)=>setTugas(p=>[...p.filter(x=>normDate(x.tanggal)!==tgl),...t])}/>;
      case 'surat_jalan':
        return <SuratJalan orders={orders}/>;
      case 'laporan':
      case 'laporan_dapur':
      case 'laporan_item':
        return <Laporan orders={orders}/>;
      case 'tugas_beli':
      case 'histori_beli':
        return <TugasBeli user={user} tugasBeli={tugas} allUsers={allUsers}
          onStatusChanged={(id,status)=>setTugas(p=>p.map(t=>t.id===id?{...t,status}:t))}
          onHargaSaved={(id,h)=>setTugas(p=>p.map(t=>t.id===id?{...t,harga_beli:h,status:'done'}:t))}/>;
      case 'pengiriman':
        return <PengirimanView user={user} orders={orders} pengiriman={pngrm} onKonfirmasi={pid=>setPngrm(p=>p.map(x=>x.id===pid?{...x,status:'delivered'}:x))}/>;
      case 'kelola_akun':
        return <KelolaAkun allUsers={allUsers} onUsersChanged={setAllUsers}/>;
      default:
        return <Dashboard orders={orders} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={handleCancelOrder} isAdmin={isAdmin}/>;
    }
  };

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar user={user} view={view} setView={setView} onLogout={logout}/>
      <main style={{flex:1,overflow:'auto',background:'#f3f4f6'}}>{renderView()}</main>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#6b7280">Memuat aplikasi...</div></div>
<script type="text/babel">
const {useState, useMemo, useEffect, useCallback} = React;

// =============================================
// ⚙️ KONFIGURASI — ISI URL APPS SCRIPT KAMU
// =============================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDvERzufLQJNeYreqZMZfEdGjBUxDw3avmYKvLOG8NJTJ5yF3Z67LVriqfyZUl4gOJ6w/exec';
// Ganti XXXXXXX dengan URL deployment Apps Script kamu

// ---- KONSTANTA ----
const DAPUR = [
  {id:'mekarsari', nama:'Mekarsari',   pic:'Bu Sari',       hp:'08111111111',    alamat:'SPPG Mekarsari, Bandung'},
  {id:'cipeujeuh2',nama:'Cipeujeuh 2', pic:'Pak Hendra',    hp:'08222222222',    alamat:'SPPG Cipeujeuh 2, Bandung'},
  {id:'sukamukti', nama:'Sukamukti',   pic:'Della Maldini', hp:'0882000476152',  alamat:'SPPG Sukamukti, Majalaya'},
  {id:'cipaku2',   nama:'Cipaku 2',    pic:'Bu Wati',       hp:'08444444444',    alamat:'SPPG Cipaku 2, Bandung'},
];
// STAF_BELI dimuat dinamis dari Google Sheets (lihat App component)

// ---- HELPERS ----
function fRp(n) {
  if (!n || isNaN(n)) return 'Rp 0';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function parseRAB(text) {
  const lines = text.trim().split('\n');
  const items = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const p = line.split('\t');
    if (p.length >= 4) {
      const nama = p[0].trim();
      const qty  = parseFloat(p[1].replace(',','.')) || 0;
      const sat  = p[2].trim();
      const h    = parseInt(p[3].replace(/[^0-9]/g,'')) || 0;
      if (nama && qty > 0) items.push({nama, qty, satuan: sat, harga_jual: h, harga_beli: 0});
    }
  }
  return items;
}

function nextDay(d) {
  const dt = new Date(d); dt.setDate(dt.getDate() + 1);
  return dt.toISOString().slice(0,10);
}

function navItems(role) {
  if (role==='admin')      return [{id:'dashboard',label:'Dashboard'},{id:'input_order',label:'Input Order'},{id:'rekap_beli',label:'Rekap & Tugas Beli'},{id:'surat_jalan',label:'Surat Jalan'},{id:'laporan',label:'Laporan'},{id:'kelola_akun',label:'Kelola Akun'}];
  if (role==='staf_beli')  return [{id:'tugas_beli',label:'Tugas Beli Hari Ini'},{id:'histori_beli',label:'Riwayat'}];
  if (role==='staf_kirim') return [{id:'pengiriman',label:'Daftar Pengiriman'}];
  if (role==='ceo'||role==='sekretaris') return [{id:'laporan',label:'Laporan Harian'},{id:'laporan_dapur',label:'Per Dapur'},{id:'laporan_item',label:'Per Item'}];
  return [];
}

// ---- API CLIENT ----
const api = {
  async get(action, params = {}) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    const res = await fetch(`${SCRIPT_URL}?${qs}`);
    return res.json();
  },
  async post(body) {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(body),
    });
    return res.json();
  }
};

// ---- STYLES ----
const cs = {
  card: {background:'var(--color-background-primary,#fff)',border:'0.5px solid var(--color-border-tertiary,#e5e7eb)',borderRadius:'12px',padding:'1rem 1.25rem'},
  met:  {background:'var(--color-background-secondary,#f9fafb)',borderRadius:'8px',padding:'1rem'},
  th:   {padding:'6px 8px',fontWeight:500,color:'var(--color-text-secondary,#6b7280)',fontSize:'12px',textAlign:'left'},
  td:   {padding:'7px 8px',fontSize:'13px',borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'},
};
const btn = (v='def') => ({
  padding:'8px 16px',fontSize:'13px',fontWeight:500,borderRadius:'8px',cursor:'pointer',border:'none',
  ...(v==='suc'?{background:'#d1fae5',color:'#065f46'}:
     v==='pri'?{background:'#dbeafe',color:'#1e40af'}:
     v==='war'?{background:'#fef3c7',color:'#92400e'}:
     v==='dan'?{background:'#fee2e2',color:'#991b1b'}:
     {background:'transparent',color:'var(--color-text-secondary,#6b7280)',border:'0.5px solid var(--color-border-secondary,#d1d5db)'}),
});
const badge = (v='inf') => ({
  fontSize:'11px',padding:'2px 8px',borderRadius:'6px',fontWeight:500,display:'inline-block',
  ...(v==='suc'?{background:'#d1fae5',color:'#065f46'}:
     v==='war'?{background:'#fef3c7',color:'#92400e'}:
     v==='dan'?{background:'#fee2e2',color:'#991b1b'}:
     {background:'#dbeafe',color:'#1e40af'}),
});
const sbadge = (s) => {
  if (s==='delivered')    return <span style={badge('suc')}>Terkirim</span>;
  if (s==='pending_kirim')return <span style={badge('war')}>Siap Kirim</span>;
  if (s==='cancelled')    return <span style={badge('dan')}>Dibatalkan</span>;
  return <span style={badge('inf')}>Draft</span>;
};

// ---- LOADING SPINNER ----
function Spinner({text='Memuat...'}) {
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'3rem',gap:'8px',color:'var(--color-text-secondary,#6b7280)',fontSize:'13px'}}>
      <div style={{width:'16px',height:'16px',border:'2px solid var(--color-border-tertiary,#e5e7eb)',borderTopColor:'#1e40af',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      {text}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ---- ERROR BOX ----
function ErrorBox({message, onRetry}) {
  return (
    <div style={{padding:'1rem',background:'#fee2e2',borderRadius:'8px',color:'#991b1b',fontSize:'13px',display:'flex',gap:'12px',alignItems:'center',margin:'1rem'}}>
      <span>Gagal memuat data: {message}</span>
      {onRetry && <button onClick={onRetry} style={{...btn('dan'),padding:'4px 12px',fontSize:'12px'}}>Coba Lagi</button>}
    </div>
  );
}

// =============================================
// LOGIN
// =============================================
function Login({onLogin}) {
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);
  const handle = async () => {
    if (!u || !p) { setErr('Isi username dan password'); return; }
    setLoading(true); setErr('');
    try {
      const res = await api.get('login', {username: u, password: p});
      if (res.success) onLogin(res.user);
      else setErr(res.message || 'Login gagal');
    } catch(e) { setErr('Tidak bisa terhubung ke server. Cek koneksi internet.'); }
    setLoading(false);
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--color-background-tertiary,#f3f4f6)'}}>
      <div style={{...cs.card,width:'100%',maxWidth:'360px',padding:'2rem'}}>
        <div style={{textAlign:'center',marginBottom:'2rem'}}>
          <div style={{width:'52px',height:'52px',borderRadius:'50%',background:'#d1fae5',color:'#065f46',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:'22px',fontWeight:700}}>K</div>
          <div style={{fontSize:'11px',color:'var(--color-text-secondary,#6b7280)',marginBottom:'4px'}}>KOPERASI INSAN SINERGI SEJAHTERA</div>
          <div style={{fontSize:'17px',fontWeight:500}}>Sistem Manajemen Bahan</div>
        </div>
        <div style={{marginBottom:'12px'}}>
          <label style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',display:'block',marginBottom:'4px'}}>Username</label>
          <input value={u} onChange={e=>setU(e.target.value)} placeholder="Masukkan username" style={{width:'100%',boxSizing:'border-box'}}/>
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',display:'block',marginBottom:'4px'}}>Password</label>
          <div style={{position:'relative'}}>
            <input type={showPass?'text':'password'} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} placeholder="Masukkan password" style={{width:'100%',boxSizing:'border-box',paddingRight:'40px'}}/>
            <button onClick={()=>setShowPass(x=>!x)} style={{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'13px',padding:'2px 4px'}}>
              {showPass ? '🙈' : '👁️'}
            </button>
          </div>
        </div>
        {err && <div style={{fontSize:'12px',color:'#991b1b',marginBottom:'12px',padding:'8px',background:'#fee2e2',borderRadius:'6px'}}>{err}</div>}
        <button onClick={handle} disabled={loading} style={{...btn('suc'),width:'100%',padding:'10px',fontSize:'14px',opacity:loading?0.6:1}}>
          {loading ? 'Masuk...' : 'Masuk'}
        </button>
      </div>
    </div>
  );
}

// =============================================
// SIDEBAR
// =============================================
function Sidebar({user,view,setView,onLogout}) {
  const items = navItems(user.role);
  const rl = {admin:'Admin',staf_beli:'Staf Pembelian',staf_kirim:'Staf Pengiriman',ceo:'CEO',sekretaris:'Sekretaris'}[user.role]||user.role;
  return (
    <div style={{width:'200px',flexShrink:0,background:'var(--color-background-primary,#fff)',borderRight:'0.5px solid var(--color-border-tertiary,#e5e7eb)',display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div style={{padding:'1rem',borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)',display:'flex',alignItems:'center',gap:'8px'}}>
        <div style={{width:'30px',height:'30px',borderRadius:'50%',background:'#d1fae5',color:'#065f46',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flexShrink:0}}>K</div>
        <div><div style={{fontSize:'10px',color:'var(--color-text-tertiary,#9ca3af)'}}>Koperasi ISS</div><div style={{fontSize:'12px',fontWeight:500}}>Bahan Dapur</div></div>
      </div>
      <div style={{padding:'0.75rem 1rem',borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>
        <div style={{fontSize:'13px',fontWeight:500}}>{user.name}</div>
        <div style={{fontSize:'11px',color:'var(--color-text-tertiary,#9ca3af)'}}>{rl}</div>
      </div>
      <nav style={{flex:1,padding:'0.5rem'}}>
        {items.map(it=>(
          <button key={it.id} onClick={()=>setView(it.id)} style={{display:'block',width:'100%',textAlign:'left',padding:'8px 10px',fontSize:'13px',background:view===it.id?'var(--color-background-secondary,#f9fafb)':'transparent',color:view===it.id?'var(--color-text-primary,#111)':'var(--color-text-secondary,#6b7280)',border:'none',borderRadius:'8px',cursor:'pointer',marginBottom:'1px',fontWeight:view===it.id?500:400}}>
            {it.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'0.5rem'}}>
        <button onClick={onLogout} style={{display:'block',width:'100%',textAlign:'left',padding:'8px 10px',fontSize:'13px',color:'#991b1b',background:'transparent',border:'none',cursor:'pointer',borderRadius:'8px'}}>Keluar</button>
      </div>
    </div>
  );
}

// =============================================
// DASHBOARD
// =============================================
function Dashboard({orders,pengiriman,loading,error,onRefresh,onCancelOrder,isAdmin}) {
  const tj = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
  const tb = orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
  const pf = tj - tb;
  const [confirmId, setConfirmId] = useState(null);
  const [cancelling, setCancelling] = useState(false);

  const handleCancel = async () => {
    setCancelling(true);
    try {
      const res = await api.post({action:'updateOrderStatus', orderId: confirmId, status:'cancelled'});
      if (res.success) { onCancelOrder(confirmId); setConfirmId(null); }
      else alert('Gagal membatalkan: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setCancelling(false);
  };

  const cancelableOrder = orders.find(o=>o.id===confirmId);
  const cancelableDapur = DAPUR.find(d=>d.id===cancelableOrder?.dapur_id);

  return (
    <div style={{padding:'1.5rem'}}>
      {/* MODAL KONFIRMASI BATALKAN */}
      {confirmId && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
          <div style={{background:'#fff',borderRadius:'12px',padding:'1.5rem',maxWidth:'380px',width:'90%',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{fontSize:'36px',textAlign:'center',marginBottom:'12px'}}>⚠️</div>
            <div style={{fontSize:'16px',fontWeight:600,textAlign:'center',marginBottom:'8px',color:'#111'}}>Batalkan Order?</div>
            <div style={{fontSize:'13px',color:'#6b7280',textAlign:'center',marginBottom:'1.5rem',lineHeight:'1.6'}}>
              Kamu akan membatalkan order <strong style={{color:'#111'}}>{cancelableDapur?.nama}</strong> tanggal kirim <strong style={{color:'#111'}}>{cancelableOrder?.tanggal_kirim}</strong>. Tindakan ini tidak dapat diurungkan.
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setConfirmId(null)} style={{...btn(),flex:1,padding:'10px',fontSize:'13px'}}>Batal</button>
              <button onClick={handleCancel} disabled={cancelling}
                style={{...btn('dan'),flex:1,padding:'10px',fontSize:'13px',fontWeight:600,opacity:cancelling?0.6:1}}>
                {cancelling ? 'Membatalkan...' : 'Ya, Batalkan'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h2 style={{margin:0}}>Dashboard</h2>
        <button onClick={onRefresh} style={{...btn(),padding:'6px 14px',fontSize:'12px'}}>↻ Refresh</button>
      </div>
      {error && <ErrorBox message={error} onRetry={onRefresh}/>}
      {loading ? <Spinner/> : <>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:'10px',marginBottom:'1.5rem'}}>
          {[{l:'Total Order',v:orders.length+' order'},{l:'Total Penjualan',v:fRp(tj)},{l:'Total Pembelian',v:fRp(tb)},{l:'Profit',v:fRp(pf)}].map(c=>(
            <div key={c.l} style={cs.met}><div style={{fontSize:'11px',color:'var(--color-text-secondary,#6b7280)',marginBottom:'4px'}}>{c.l}</div><div style={{fontSize:'16px',fontWeight:500}}>{c.v}</div></div>
          ))}
        </div>
        <div style={cs.card}>
          <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Semua Order</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>
                {['Dapur','Tgl Order','Tgl Kirim','Item','Nilai Jual','Status',isAdmin?'Aksi':''].map((h,i)=><th key={i} style={{...cs.th,textAlign:i===4?'right':'left'}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {orders.map(o=>{
                  const d=DAPUR.find(x=>x.id===o.dapur_id);
                  const n=o.items.reduce((s,i)=>s+i.qty*i.harga_jual,0);
                  const canCancel = isAdmin && o.status !== 'delivered' && o.status !== 'cancelled';
                  return(
                  <tr key={o.id} style={{opacity:o.status==='cancelled'?0.5:1}}>
                    <td style={cs.td}>{d?.nama}</td>
                    <td style={{...cs.td,color:'var(--color-text-secondary,#6b7280)'}}>{o.tanggal_order}</td>
                    <td style={{...cs.td,color:'var(--color-text-secondary,#6b7280)'}}>{o.tanggal_kirim}</td>
                    <td style={{...cs.td,color:'var(--color-text-secondary,#6b7280)'}}>{o.items.length} item</td>
                    <td style={{...cs.td,textAlign:'right',textDecoration:o.status==='cancelled'?'line-through':''}}>{fRp(n)}</td>
                    <td style={cs.td}>{sbadge(o.status)}</td>
                    {isAdmin && <td style={cs.td}>
                      {canCancel && (
                        <button onClick={()=>setConfirmId(o.id)}
                          style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>
                          Batalkan
                        </button>
                      )}
                    </td>}
                  </tr>
                );})}
                {!orders.length && <tr><td colSpan={7} style={{...cs.td,textAlign:'center',color:'var(--color-text-secondary,#6b7280)'}}>Belum ada order</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </>}
    </div>
  );
}

// =============================================
// INPUT ORDER
// =============================================
function InputOrder({onOrderAdded,setView}) {
  const [step,setStep]=useState(1); const [sel,setSel]=useState(''); const [rab,setRab]=useState(''); const [items,setItems]=useState([]);
  const [tO,setTO]=useState(new Date().toISOString().slice(0,10)); const [tK,setTK]=useState(nextDay(new Date().toISOString().slice(0,10)));
  const [err,setErr]=useState(''); const [saving,setSaving]=useState(false);
  const parse=()=>{const it=parseRAB(rab);if(!it.length){setErr('Format tidak dikenali. Pastikan copy langsung dari spreadsheet (kolom tab-separated).');return;}setErr('');setItems(it);setStep(3);};
  const upd=(idx,f,v)=>setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:f==='qty'?parseFloat(v)||0:parseInt(v)||0}:it));
  const rem=idx=>setItems(p=>p.filter((_,i)=>i!==idx));
  const sub=async()=>{
    setSaving(true);
    const order={id:'ord-'+Date.now(),dapur_id:sel,tanggal_order:tO,tanggal_kirim:tK,status:'draft',items};
    try {
      const res = await api.post({action:'addOrder',order});
      if (res.success) { onOrderAdded(order); alert('Order berhasil disimpan!'); setView('dashboard'); }
      else alert('Gagal menyimpan: '+(res.error||'Error'));
    } catch(e) { alert('Koneksi bermasalah: '+e.message); }
    setSaving(false);
  };
  const tj=items.reduce((s,i)=>s+i.qty*i.harga_jual,0);
  const stps=['Pilih Dapur','Paste RAB','Review & Submit'];
  return (
    <div style={{padding:'1.5rem',maxWidth:'820px'}}>
      <h2 style={{marginBottom:'1rem'}}>Input Order Baru</h2>
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'1.5rem'}}>
        {stps.map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
          <div style={{width:'22px',height:'22px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,background:step>i+1?'#d1fae5':step===i+1?'#dbeafe':'var(--color-background-secondary,#f9fafb)',color:step>i+1?'#065f46':step===i+1?'#1e40af':'var(--color-text-tertiary,#9ca3af)'}}>{step>i+1?'✓':i+1}</div>
          <span style={{fontSize:'12px',color:step===i+1?'var(--color-text-primary,#111)':'var(--color-text-tertiary,#9ca3af)'}}>{s}</span>
          {i<2&&<span style={{color:'var(--color-text-tertiary,#9ca3af)'}}>›</span>}
        </div>)}
      </div>
      <div style={cs.card}>
        {step===1&&<div>
          <div style={{display:'flex',gap:'16px',marginBottom:'1rem'}}>
            <div><label style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',display:'block',marginBottom:'4px'}}>Tanggal Order</label><input type="date" value={tO} onChange={e=>{setTO(e.target.value);setTK(nextDay(e.target.value));}}/></div>
            <div><label style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',display:'block',marginBottom:'4px'}}>Tanggal Kirim</label><input type="date" value={tK} onChange={e=>setTK(e.target.value)}/></div>
          </div>
          <div style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',marginBottom:'8px'}}>Pilih Dapur</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'1.25rem'}}>
            {DAPUR.map(d=><button key={d.id} onClick={()=>setSel(d.id)} style={{padding:'12px',textAlign:'left',background:sel===d.id?'#dbeafe':'var(--color-background-secondary,#f9fafb)',border:sel===d.id?'1.5px solid #93c5fd':'0.5px solid var(--color-border-tertiary,#e5e7eb)',borderRadius:'8px',cursor:'pointer'}}>
              <div style={{fontSize:'14px',fontWeight:500,color:sel===d.id?'#1e40af':'var(--color-text-primary,#111)'}}>{d.nama}</div>
              <div style={{fontSize:'12px',color:'var(--color-text-secondary,#6b7280)',marginTop:'2px'}}>{d.pic}</div>
            </button>)}

function RekapBeli({orders, tugasBeli, onTugasSaved, stafBeli, allUsers}) {
  const [sd,setSd]       = useState(nextDay(new Date().toISOString().slice(0,10)));
  const [asgn,setAsgn]   = useState({});
  const [saving,setSaving] = useState(false);
  const [tab,setTab]     = useState('bagi'); // 'bagi' | 'monitor'

  // Rekap kebutuhan dari order
  const ri = useMemo(()=>{
    const ro = orders.filter(o=>(o.status==='draft'||o.status==='pending_kirim')&&normDate(o.tanggal_kirim)===sd);
    const m={};
    for(const o of ro) for(const it of o.items) {
      const k=it.nama+'|'+it.satuan;
      if(!m[k]) m[k]={nama:it.nama,satuan:it.satuan,total:0,ords:[]};
      m[k].total+=it.qty; m[k].ords.push({dapur:DAPUR.find(d=>d.id===o.dapur_id)?.nama,qty:it.qty});
    }
    return Object.values(m).sort((a,b)=>a.nama.localeCompare(b.nama));
  },[orders,sd]);

  // Tugas beli untuk tanggal ini
  const tugasHariIni = tugasBeli.filter(t => normDate(t.tanggal) === sd);
  const totalTugas   = tugasHariIni.length;
  const sudahBeli    = tugasHariIni.filter(t=>t.status==='bought'||t.status==='done').length;
  const hargaTerisi  = tugasHariIni.filter(t=>t.status==='done').length;
  const belumBeli    = totalTugas - sudahBeli;

  const getNama = (stafId) => {
    const u = allUsers.find(x=>x.username===stafId||x.id===stafId);
    return u ? u.name : stafId;
  };

  const sa=(nm,f,v)=>setAsgn(p=>({...p,[nm]:{...(p[nm]||{}),[f]:v}}));

  const save=async()=>{
    const tugas=ri.filter(it=>asgn[it.nama]?.staf).map(it=>({
      id:'tgs-'+Date.now()+'-'+it.nama.replace(/\s/g,''), tanggal:sd,
      staf_id:asgn[it.nama].staf, nama_bahan:it.nama,
      qty:parseFloat(asgn[it.nama].qty)||it.total, satuan:it.satuan, harga_beli:0, status:'pending'
    }));
    if(!tugas.length){alert('Pilih staf untuk minimal satu item');return;}
    setSaving(true);
    try {
      const res = await api.post({action:'saveTugasBeli',tugas,tanggal:sd});
      if(res.success){onTugasSaved(tugas,sd);alert('Tugas tersimpan! '+tugas.length+' tugas dibagikan.');}
      else alert('Gagal: '+(res.error||''));
    } catch(e){alert('Koneksi bermasalah');}
    setSaving(false);
  };

  const wa=()=>{
    const ls=['*Tugas Beli Bahan - '+sd+'*',''];const bs={};
    for(const it of ri){const a=asgn[it.nama];if(a?.staf){const sn=stafBeli.find(s=>s.id===a.staf)?.nama||a.staf;if(!bs[sn])bs[sn]=[];bs[sn].push(`• ${it.nama}: ${parseFloat(a.qty)||it.total} ${it.satuan}`);}}
    for(const[sn,its]of Object.entries(bs)){ls.push(`*${sn}:*`);its.forEach(x=>ls.push(x));ls.push('');}
    if(navigator.clipboard) navigator.clipboard.writeText(ls.join('\n')).then(()=>alert('Teks WA disalin!'));
  };

  const statusBadgeTugas = (s) => {
    if(s==='done')   return <span style={badge('suc')}>Harga ✓</span>;
    if(s==='bought') return <span style={badge('war')}>Sudah beli</span>;
    return <span style={{...badge('inf'),background:'#f3f4f6',color:'#6b7280'}}>Belum</span>;
  };

  return (
    <div style={{padding:'1.5rem',maxWidth:'980px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
        <h2 style={{margin:0}}>Rekap & Tugas Beli</h2>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <label style={{fontSize:'12px',color:'#6b7280'}}>Tgl Kirim:</label>
          <input type="date" value={sd} onChange={e=>setSd(e.target.value)}/>
        </div>
      </div>

      {/* Notifikasi progress jika ada tugas */}
      {totalTugas > 0 && (
        <div style={{...cs.card,marginBottom:'1rem',border: belumBeli>0?'1px solid #fde68a':'1px solid #a7f3d0',background:belumBeli>0?'#fffbeb':'#f0fdf4'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
            <div style={{fontSize:'13px',fontWeight:500,color: belumBeli>0?'#92400e':'#065f46'}}>
              {belumBeli>0 ? `⚠️ ${belumBeli} item belum dibeli` : '✅ Semua item sudah dibeli!'}
            </div>
            <div style={{fontSize:'12px',color:'#6b7280'}}>{hargaTerisi}/{totalTugas} harga terisi</div>
          </div>
          <div style={{height:'6px',background:'#e5e7eb',borderRadius:'3px',overflow:'hidden'}}>
            <div style={{height:'100%',background:'#065f46',borderRadius:'3px',width:`${totalTugas>0?(hargaTerisi/totalTugas)*100:0}%`,transition:'width 0.3s'}}/>
          </div>
        </div>
      )}

      {/* Tab navigation */}
      <div style={{display:'flex',gap:'4px',marginBottom:'1rem',borderBottom:'1px solid #e5e7eb',paddingBottom:'0'}}>
        {[['bagi','Bagi Tugas'],['monitor','Monitor Status']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:'8px 16px',fontSize:'13px',fontWeight:tab===id?500:400,border:'none',background:'transparent',cursor:'pointer',borderBottom:tab===id?'2px solid #1e40af':'2px solid transparent',color:tab===id?'#1e40af':'#6b7280'}}>
            {lbl} {id==='monitor'&&belumBeli>0&&<span style={{...badge('war'),fontSize:'10px',marginLeft:'4px',padding:'1px 6px'}}>{belumBeli}</span>}
          </button>
        ))}
      </div>

      {/* TAB 1: BAGI TUGAS */}
      {tab==='bagi' && (
        !ri.length ? (
          <div style={{...cs.met,padding:'2rem',textAlign:'center',color:'#6b7280'}}>Tidak ada order aktif untuk tanggal {sd}</div>
        ) : (
          <>
            <div style={cs.card}>
              <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Total Kebutuhan — {ri.length} item</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                  <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                    {['Bahan','Total','Sat','Rincian per Dapur','Staf','Qty Beli'].map((h,i)=>(
                      <th key={i} style={{...cs.th,textAlign:i===1||i===2?'right':'left'}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>{ri.map(it=>(
                    <tr key={it.nama} style={{borderBottom:'1px solid #f9fafb'}}>
                      <td style={{...cs.td,fontWeight:500}}>{it.nama}</td>
                      <td style={{...cs.td,textAlign:'right',color:'#1e40af',fontWeight:600}}>{it.total}</td>
                      <td style={{...cs.td,textAlign:'right',color:'#6b7280'}}>{it.satuan}</td>
                      <td style={{...cs.td,fontSize:'11px',color:'#6b7280'}}>{it.ords.map(o=>`${o.dapur}: ${o.qty}`).join(' · ')}</td>
                      <td style={cs.td}>
                        <select value={asgn[it.nama]?.staf||''} onChange={e=>sa(it.nama,'staf',e.target.value)} style={{fontSize:'12px',padding:'4px'}}>
                          <option value="">— Pilih —</option>
                          {stafBeli.map(s=><option key={s.id} value={s.id}>{s.nama}</option>)}
                        </select>
                      </td>
                      <td style={cs.td}>
                        <input type="number" defaultValue={it.total} onChange={e=>sa(it.nama,'qty',e.target.value)} style={{width:'65px',textAlign:'right',padding:'4px',fontSize:'12px'}}/>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'1rem'}}>
              <button onClick={save} disabled={saving} style={{...btn('suc'),opacity:saving?0.6:1}}>{saving?'Menyimpan...':'Simpan Tugas Beli'}</button>
              <button onClick={wa} style={btn('war')}>Salin Teks WA</button>
            </div>
          </>
        )
      )}

      {/* TAB 2: MONITOR STATUS */}
      {tab==='monitor' && (
        !tugasHariIni.length ? (
          <div style={{...cs.met,padding:'2rem',textAlign:'center',color:'#6b7280'}}>Belum ada tugas yang dibuat untuk tanggal {sd}.<br/>Buat tugas dulu di tab "Bagi Tugas".</div>
        ) : (
          <div style={cs.card}>
            <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Status Pembelian — {tugasHariIni.length} item</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                {['Staf','Bahan','Qty','Status','Harga Beli'].map((h,i)=>(
                  <th key={i} style={{...cs.th,textAlign:i>=3?'right':'left'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {tugasHariIni.map(t=>(
                  <tr key={t.id} style={{borderBottom:'1px solid #f9fafb'}}>
                    <td style={{...cs.td,fontWeight:500}}>{getNama(t.staf_id)}</td>
                    <td style={cs.td}>{t.nama_bahan}</td>
                    <td style={{...cs.td,color:'#6b7280'}}>{t.qty} {t.satuan}</td>
                    <td style={{...cs.td,textAlign:'right'}}>{statusBadgeTugas(t.status)}</td>
                    <td style={{...cs.td,textAlign:'right',fontWeight:500,color:t.status==='done'?'#065f46':'#9ca3af'}}>
                      {t.status==='done' ? fRp(t.harga_beli) : '—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      )}
    </div>
  );
}

// Helper: normalize tanggal dari Google Sheets (bisa berupa ISO string atau sudah YYYY-MM-DD)
function normDate(d) {
  if (!d) return '';
  const s = String(d);
  if (s.includes('T')) return s.slice(0,10);
  return s;
}

function TugasBeli({user, tugasBeli, onHargaSaved, onStatusChanged, stafBeli, allUsers}) {
  const [hi,setHi]         = useState({});
  const [saving,setSaving] = useState({});
  const [konfirm,setKonfirm] = useState({});
  const today = new Date().toISOString().slice(0,10);

  // Ambil tugas hari ini dari semua staf (untuk saling lihat)
  const semuaTugas = tugasBeli.filter(t => normDate(t.tanggal) === today || normDate(t.tanggal) === normDate(t.tanggal));
  // Group per staf
  const stafList = [...new Map(semuaTugas.map(t => [t.staf_id, t])).values()].map(t => t.staf_id);

  const getNama = (stafId) => {
    const u = allUsers.find(x => x.username === stafId || x.id === stafId);
    return u ? u.name : stafId;
  };

  const isOwn = (t) => String(t.staf_id) === String(user.u);

  // Konfirmasi sudah beli
  const handleBeli = async (t) => {
    setKonfirm(p=>({...p,[t.id]:true}));
    try {
      const res = await api.post({action:'updateTugasStatus', tugasId: t.id, status:'bought'});
      if (res.success) onStatusChanged(t.id, 'bought');
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setKonfirm(p=>({...p,[t.id]:false}));
  };

  // Simpan harga beli
  const handleHarga = async (id) => {
    const h = parseFloat(hi[id])||0;
    if (h<=0) { alert('Masukkan harga yang valid'); return; }
    setSaving(p=>({...p,[id]:true}));
    try {
      const res = await api.post({action:'updateHargaBeli', tugasId:id, hargaBeli:h});
      if (res.success) onHargaSaved(id, h);
      else alert('Gagal: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setSaving(p=>({...p,[id]:false}));
  };

  const statusIcon = (s) => {
    if (s==='done')   return <span style={badge('suc')}>Selesai ✓</span>;
    if (s==='bought') return <span style={badge('war')}>Sudah dibeli</span>;
    return <span style={badge('inf')}>Belum beli</span>;
  };

  // Ringkasan progress hari ini
  const total  = semuaTugas.length;
  const bought = semuaTugas.filter(t=>t.status==='bought'||t.status==='done').length;
  const done   = semuaTugas.filter(t=>t.status==='done').length;

  // Tugas milik staf ini
  const myTugas = semuaTugas.filter(t => isOwn(t));
  // Tugas staf lain
  const otherTugas = semuaTugas.filter(t => !isOwn(t));

  return (
    <div style={{padding:'1.5rem', maxWidth:'720px'}}>
      <h2 style={{marginBottom:'4px'}}>Tugas Beli Hari Ini</h2>
      <div style={{fontSize:'13px',color:'#6b7280',marginBottom:'1rem'}}>Halo {user.name}!</div>

      {/* Progress bar semua staf */}
      {total > 0 && (
        <div style={{...cs.card, marginBottom:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
            <div style={{fontSize:'13px',fontWeight:500}}>Progress Hari Ini</div>
            <div style={{fontSize:'12px',color:'#6b7280'}}>{done}/{total} selesai</div>
          </div>
          <div style={{height:'8px',background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',marginBottom:'8px'}}>
            <div style={{height:'100%',background:'#065f46',borderRadius:'4px',width:`${total>0?(done/total)*100:0}%`,transition:'width 0.3s'}}/>
          </div>
          <div style={{display:'flex',gap:'12px',fontSize:'11px'}}>
            <span style={{color:'#6b7280'}}>⬜ Belum: {total-bought}</span>
            <span style={{color:'#92400e'}}>🟡 Sudah beli: {bought-done}</span>
            <span style={{color:'#065f46'}}>✅ Harga terisi: {done}</span>
          </div>
        </div>
      )}

      {/* Tugas milik sendiri */}
      {!myTugas.length ? (
        <div style={{...cs.met,padding:'2rem',textAlign:'center',color:'#6b7280',marginBottom:'1rem'}}>Belum ada tugas yang ditugaskan untukmu hari ini.</div>
      ) : (
        <>
          <div style={{fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'8px'}}>Tugasmu ({myTugas.length} item)</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'1.5rem'}}>
            {myTugas.map(t=>(
              <div key={t.id} style={{...cs.card,border: t.status==='done'?'1px solid #a7f3d0': t.status==='bought'?'1px solid #fde68a':'1px solid #e5e7eb'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
                  <div>
                    <div style={{fontWeight:500,marginBottom:'2px'}}>{t.nama_bahan}</div>
                    <div style={{fontSize:'12px',color:'#6b7280'}}>{t.qty} {t.satuan}</div>
                  </div>
                  {statusIcon(t.status)}
                </div>
                {/* Step 1: Belum beli → tombol konfirmasi */}
                {t.status==='pending' && (
                  <button onClick={()=>handleBeli(t)} disabled={konfirm[t.id]}
                    style={{...btn('pri'),width:'100%',padding:'9px',opacity:konfirm[t.id]?0.6:1}}>
                    {konfirm[t.id]?'Menyimpan...':'✓ Konfirmasi Sudah Beli di Pasar'}
                  </button>
                )}
                {/* Step 2: Sudah beli → isi harga */}
                {t.status==='bought' && (
                  <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginTop:'4px'}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:'11px',color:'#6b7280',display:'block',marginBottom:'4px'}}>Harga beli per {t.satuan} (Rp):</label>
                      <input type="number" placeholder="contoh: 32000" value={hi[t.id]||''} onChange={e=>setHi(p=>({...p,[t.id]:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/>
                    </div>
                    <button onClick={()=>handleHarga(t.id)} disabled={saving[t.id]}
                      style={{...btn('suc'),padding:'9px 16px',opacity:saving[t.id]?0.6:1}}>
                      {saving[t.id]?'...':'Simpan'}
                    </button>
                  </div>
                )}
                {/* Step 3: Done → tampilkan harga */}
                {t.status==='done' && (
                  <div style={{fontSize:'13px',color:'#065f46',fontWeight:500,marginTop:'4px'}}>
                    Harga beli: {fRp(t.harga_beli)} / {t.satuan}
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {/* Tugas staf lain — read only */}
      {otherTugas.length > 0 && (
        <>
          <div style={{fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'8px'}}>Tugas Staf Lain</div>
          <div style={{...cs.card}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead><tr style={{borderBottom:'1px solid #f3f4f6'}}>
                {['Staf','Bahan','Qty','Status','Harga Beli'].map((h,i)=>(
                  <th key={i} style={{...cs.th,textAlign:i>=3?'center':'left'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {otherTugas.map(t=>(
                  <tr key={t.id} style={{borderBottom:'1px solid #f9fafb',opacity:t.status==='pending'?0.7:1}}>
                    <td style={cs.td}><span style={{fontSize:'12px',fontWeight:500}}>{getNama(t.staf_id)}</span></td>
                    <td style={cs.td}>{t.nama_bahan}</td>
                    <td style={{...cs.td,color:'#6b7280'}}>{t.qty} {t.satuan}</td>
                    <td style={{...cs.td,textAlign:'center'}}>{statusIcon(t.status)}</td>
                    <td style={{...cs.td,textAlign:'center',color:'#065f46',fontWeight:500}}>{t.status==='done'?fRp(t.harga_beli):'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

// LAPORAN
// =============================================
function Laporan({orders}) {
  const tj=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
  const tb=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
  const pf=tj-tb;const mg=tj>0?((pf/tj)*100).toFixed(1):0;
  const pd=DAPUR.map(d=>{const dos=orders.filter(o=>o.dapur_id===d.id);const j=dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);const b=dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);return{nama:d.nama,ords:dos.length,j,b,pf:j-b};});
  const im={};for(const o of orders)for(const it of o.items){if(!im[it.nama])im[it.nama]={nama:it.nama,qty:0,j:0,b:0};im[it.nama].qty+=it.qty;im[it.nama].j+=it.qty*it.harga_jual;im[it.nama].b+=it.qty*it.harga_beli;}
  const pi=Object.values(im).map(x=>({...x,pf:x.j-x.b})).sort((a,b)=>b.pf-a.pf);
  return(
    <div style={{padding:'1.5rem',maxWidth:'960px'}}>
      <h2 style={{marginBottom:'1.5rem'}}>Laporan Keuangan</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:'10px',marginBottom:'1.5rem'}}>
        {[{l:'Total Penjualan',v:fRp(tj)},{l:'Total Pembelian',v:fRp(tb)},{l:'Total Profit',v:fRp(pf)},{l:'Margin',v:mg+'%'}].map(c=>(
          <div key={c.l} style={cs.met}><div style={{fontSize:'11px',color:'var(--color-text-secondary,#6b7280)',marginBottom:'4px'}}>{c.l}</div><div style={{fontSize:'16px',fontWeight:500}}>{c.v}</div></div>
        ))}
      </div>
      <div style={{...cs.card,marginBottom:'1rem'}}>
        <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Per Dapur</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
            <thead><tr style={{borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>{['Dapur','Order','Penjualan','Pembelian','Profit','Margin'].map((h,i)=><th key={i} style={{...cs.th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>{pd.map(d=><tr key={d.nama} style={{borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>
              <td style={cs.td}>{d.nama}</td><td style={cs.td}>{d.ords}</td>
              <td style={{...cs.td,textAlign:'right'}}>{fRp(d.j)}</td><td style={{...cs.td,textAlign:'right'}}>{fRp(d.b)}</td>
              <td style={{...cs.td,textAlign:'right',fontWeight:600,color:d.pf>=0?'#065f46':'#991b1b'}}>{fRp(d.pf)}</td>
              <td style={{...cs.td,textAlign:'right',color:'var(--color-text-secondary,#6b7280)'}}>{d.j>0?((d.pf/d.j)*100).toFixed(1):0}%</td>
            </tr>)}</tbody>
          </table>
        </div>
      </div>
      <div style={cs.card}>
        <div style={{fontSize:'14px',fontWeight:500,marginBottom:'12px'}}>Per Item — profit tertinggi</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
            <thead><tr style={{borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>{['Bahan','Total Qty','Penjualan','Pembelian','Profit'].map((h,i)=><th key={i} style={{...cs.th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>{pi.map(it=><tr key={it.nama} style={{borderBottom:'0.5px solid var(--color-border-tertiary,#e5e7eb)'}}>
              <td style={cs.td}>{it.nama}</td><td style={cs.td}>{it.qty}</td>
              <td style={{...cs.td,textAlign:'right'}}>{fRp(it.j)}</td><td style={{...cs.td,textAlign:'right'}}>{fRp(it.b)}</td>
              <td style={{...cs.td,textAlign:'right',fontWeight:600,color:it.pf>=0?'#065f46':'#991b1b'}}>{fRp(it.pf)}</td>
            </tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function KelolaAkun({onUsersChanged}) {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving]     = useState(false);
  const [showPassMap, setShowPassMap] = useState({});
  const [delConfirm, setDelConfirm]   = useState(null);
  const [deleting, setDeleting]       = useState(false);
  const [form, setForm] = useState({name:'', username:'', password:'', role:'staf_beli'});
  const [formErr, setFormErr]   = useState('');
  const [showNewPass, setShowNewPass] = useState(false);

  const allowedRoles = ['staf_beli','staf_kirim'];
  const roleLabel = {staf_beli:'Staf Pembelian', staf_kirim:'Staf Pengiriman'};
  const roleBg    = {staf_beli:'#d1fae5', staf_kirim:'#fef3c7'};
  const roleColor = {staf_beli:'#065f46', staf_kirim:'#92400e'};

  const load = async () => {
    setLoading(true);
    try {
      const res = await api.get('getUsers');
      if (Array.isArray(res)) setUsers(res.filter(u => allowedRoles.includes(u.role)));
    } catch(e) {}
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const toggleShowPass = (id) => setShowPassMap(p => ({...p, [id]: !p[id]}));

  const validate = () => {
    if (!form.name.trim())     return 'Nama lengkap wajib diisi';
    if (!form.username.trim()) return 'Username wajib diisi';
    if (form.username.includes(' ')) return 'Username tidak boleh mengandung spasi';
    if (form.password.length < 4)  return 'Password minimal 4 karakter';
    if (users.find(u => u.username === form.username)) return 'Username sudah dipakai, pilih yang lain';
    return '';
  };

  const handleSave = async () => {
    const err = validate();
    if (err) { setFormErr(err); return; }
    setSaving(true); setFormErr('');
    try {
      const newUser = {id:'u-'+Date.now(), ...form};
      const res = await api.post({action:'addUser', user: newUser});
      if (res.success) {
        const updated = [...users, newUser];
        setUsers(updated);
        if (onUsersChanged) onUsersChanged(updated);
        setForm({name:'', username:'', password:'', role:'staf_beli'});
        setShowForm(false);
        setShowNewPass(false);
      } else setFormErr(res.error || 'Gagal menyimpan');
    } catch(e) { setFormErr('Koneksi bermasalah'); }
    setSaving(false);
  };

  const handleDelete = async (userId) => {
    setDeleting(true);
    try {
      const res = await api.post({action:'deleteUser', userId});
      if (res.success) {
        const updated = users.filter(u => u.id !== userId);
        setUsers(updated);
        if (onUsersChanged) onUsersChanged(updated);
        setDelConfirm(null);
      }
      else alert('Gagal menghapus: '+(res.error||''));
    } catch(e) { alert('Koneksi bermasalah'); }
    setDeleting(false);
  };

  const delUser = users.find(u => u.id === delConfirm);

    <div style={{padding:'1.5rem', maxWidth:'700px'}}>

      {/* MODAL KONFIRMASI HAPUS */}
      {delConfirm && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
          <div style={{background:'#fff',borderRadius:'12px',padding:'1.5rem',maxWidth:'360px',width:'90%'}}>
            <div style={{fontSize:'32px',textAlign:'center',marginBottom:'10px'}}>🗑️</div>
            <div style={{fontSize:'15px',fontWeight:600,textAlign:'center',marginBottom:'8px'}}>Hapus Akun?</div>
            <div style={{fontSize:'13px',color:'#6b7280',textAlign:'center',marginBottom:'1.5rem',lineHeight:'1.6'}}>

            </div>

              <button onClick={()=>setDelConfirm(null)} style={{...btn(),flex:1,padding:'9px'}}>Batal</button>

                style={{...btn('dan'),flex:1,padding:'9px',opacity:deleting?0.6:1}}>

              <thead>
                <tr style={{borderBottom:'0.5px solid #e5e7eb'}}>
                  {['Nama','Username','Password','Role',''].map((h,i)=>(
                    <th key={i} style={{...cs.th,textAlign:'left'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {users.map(u => (
                  <tr key={u.id} style={{borderBottom:'0.5px solid #f3f4f6'}}>
                    <td style={{...cs.td,fontWeight:500}}>{u.name}</td>
                    <td style={{...cs.td,fontFamily:'monospace',fontSize:'12px',color:'#374151'}}>{u.username}</td>
                    <td style={{...cs.td}}>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span style={{fontFamily:'monospace',fontSize:'12px',color:'#374151',minWidth:'80px'}}>
                          {showPassMap[u.id] ? u.password : '••••••'}
                        </span>
                        <button onClick={()=>toggleShowPass(u.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'13px',padding:'0 2px',lineHeight:1}}>
                          {showPassMap[u.id] ? '🙈' : '👁️'}
                        </button>
                      </div>
                    </td>
                    <td style={cs.td}>
                      <span style={{...badge(),background:roleBg[u.role]||'#f3f4f6',color:roleColor[u.role]||'#374151'}}>
                        {roleLabel[u.role]||u.role}
                      </span>
                    </td>
                    <td style={cs.td}>
                      <button onClick={()=>setDelConfirm(u.id)} style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>
                        Hapus
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

// =============================================
// MAIN APP
// =============================================
function App() {
  const [user,setUser]     = useState(null);
  const [view,setView]     = useState('dashboard');
  const [orders,setOrders] = useState([]);
  const [tugas,setTugas]   = useState([]);
  const [pngrm,setPngrm]   = useState([]);
  const [stafBeli,setStafBeli] = useState([]);
  const [loading,setLoading]= useState(false);
  const [error,setError]   = useState(null);

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [o, t, p, u] = await Promise.all([
        api.get('getOrders'),
        api.get('getTugasBeli'),
        api.get('getPengiriman'),
        api.get('getUsers'),
      ]);
      if (!Array.isArray(o)) throw new Error(o.error || 'getOrders gagal');
      setOrders(o); setTugas(t||[]); setPngrm(p||[]);
      if (Array.isArray(u)) {
        setStafBeli(u.filter(x=>x.role==='staf_beli').map(x=>({id:x.username,nama:x.name})));
      }
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { if (user) loadAll(); }, [user, loadAll]);

  const login  = u => { setUser(u); setView(navItems(u.role)[0]?.id||'dashboard'); };
  const logout = () => { setUser(null); setOrders([]); setTugas([]); setPngrm([]); };
  const isAdmin = user?.role === 'admin';
  const handleCancelOrder = (orderId) => {
    setOrders(prev => prev.map(o => o.id === orderId ? {...o, status:'cancelled'} : o));
  };

  if (!user) return <Login onLogin={login}/>;

  const rv = () => { switch(view) {
    case 'dashboard':    return <Dashboard orders={orders} pengiriman={pngrm} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={handleCancelOrder} isAdmin={isAdmin}/>;
    case 'input_order':  return <InputOrder onOrderAdded={o=>setOrders(p=>[...p,o])} setView={setView}/>;
    case 'rekap_beli':   return <RekapBeli orders={orders} tugasBeli={tugas} stafBeli={stafBeli} allUsers={allUsers} onTugasSaved={(t,tgl)=>setTugas(p=>[...p.filter(x=>normDate(x.tanggal)!==tgl),...t])}/>;
    case 'surat_jalan':  return <SuratJalan orders={orders}/>;
    case 'laporan': case 'laporan_dapur': case 'laporan_item': return <Laporan orders={orders}/>;
    case 'tugas_beli': case 'histori_beli': return <TugasBeli user={user} tugasBeli={tugas} allUsers={allUsers} stafBeli={stafBeli}
        onStatusChanged={(id,status)=>setTugas(p=>p.map(t=>t.id===id?{...t,status}:t))}
        onHargaSaved={(id,h)=>setTugas(p=>p.map(t=>t.id===id?{...t,harga_beli:h,status:'done'}:t))}/>;
    case 'pengiriman':   return <PengirimanView user={user} orders={orders} pengiriman={pngrm} onKonfirmasi={pid=>setPngrm(p=>p.map(x=>x.id===pid?{...x,status:'delivered'}:x))}/>;
    case 'kelola_akun':  return <KelolaAkun allUsers={allUsers} onUsersChanged={setAllUsers}/>;
    default:             return <Dashboard orders={orders} pengiriman={pngrm} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={handleCancelOrder} isAdmin={isAdmin}/>;
  }};

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar user={user} view={view} setView={setView} onLogout={logout}/>
      <main style={{flex:1,overflow:'auto',background:'var(--color-background-tertiary,#f3f4f6)'}}>{rv()}</main>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
